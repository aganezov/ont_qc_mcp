version: 2
updates:
  # 1) Python dependencies — the "uv" ecosystem reads pyproject.toml AND maintains
  # uv.lock (it bumps the pinned versions). cooldown delays each bump 7 days so a
  # freshly-published (possibly compromised) release has time to be caught/yanked
  # before we adopt it; security updates are exempt from the delay.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      # One grouped PR for all Python bumps, instead of one PR per package — far
      # less noise, and related updates get tested together.
      python-dependencies:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # 2) The GitHub Actions we pinned by commit SHA. Dependabot bumps the SHA *and*
  # the `# vN` comment for us, so SHA-pinning stays current without manual toil —
  # this is what makes "pin by SHA" sustainable rather than a maintenance burden.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    open-pull-requests-limit: 5
