name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly full run (04:32 UTC, off the top-of-hour scheduler stampede). PRs may
    # skip the heavy integration tier via change-detection; this guarantees main is
    # exercised end-to-end at least daily, catching dependency drift and real flakes.
    - cron: "32 4 * * *"
  workflow_dispatch:

# One CI run per ref+event; a newer push/PR update cancels the superseded run.
# event_name is part of the key so a push to main and the nightly schedule (both
# resolve github.ref to refs/heads/main) take separate slots instead of cancelling
# each other under cancel-in-progress.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: grant nothing by default; each job opts into only what it needs.
permissions: {}

jobs:
  # Change-detection: decides which tiers run. On a PR it inspects the changed paths;
  # on push/schedule/dispatch it forces the full suite (main must always be fully
  # validated). Downstream jobs read these outputs to skip heavy work safely.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read # paths-filter lists the PR's changed files via the API
    outputs:
      code: ${{ steps.decide.outputs.code }}
      integration: ${{ steps.decide.outputs.integration }}
    steps:
      - name: Detect changed paths (PRs only)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            code:
              - 'ont_qc_mcp/**'
              - 'tests/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            integration:
              - 'ont_qc_mcp/**'
              - 'tests/**'
              - 'docker/**'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'

      - name: Decide what to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_CODE: ${{ steps.filter.outputs.code }}
          FILTER_INTEGRATION: ${{ steps.filter.outputs.integration }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Non-PR event ($EVENT_NAME): running the full suite."
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "integration=true" >> "$GITHUB_OUTPUT"
          else
            echo "PR event: code=$FILTER_CODE integration=$FILTER_INTEGRATION"
            echo "code=$FILTER_CODE" >> "$GITHUB_OUTPUT"
            echo "integration=$FILTER_INTEGRATION" >> "$GITHUB_OUTPUT"
          fi

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (+ Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (exact versions, from uv.lock)
        # --locked fails if uv.lock is out of sync with pyproject.toml, so the
        # committed lock is itself verified on every run.
        run: uv sync --all-extras --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy ont_qc_mcp tests

      - name: Security scan (bandit)
        run: uv run bandit -r ont_qc_mcp -x tests

      - name: Dependency audit (pip-audit)
        # pytest is a test-only dependency (not in the shipped wheel). Its only
        # advisory, CVE-2025-71176, is fixed in pytest 9, which forces a
        # pytest-asyncio 1.x major upgrade â€” tracked separately. Suppress narrowly.
        run: uv run pip-audit --ignore-vuln CVE-2025-71176

      - name: Unit tests (skip integration)
        run: uv run pytest --cov=ont_qc_mcp --cov-report=xml

  # Dependency-floor guard: install the LOWEST versions our ranges allow and run
  # the unit suite, so the `>=` floors in pyproject.toml are a tested guarantee,
  # not a hopeful guess. lowest-direct pins our direct deps to their floors while
  # letting transitive deps resolve normally (the contract users actually get).
  min-deps:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    name: min-deps (floors)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (+ Python 3.10, our minimum)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.10"

      - name: Resolve floors (lowest-direct) into a venv, ignoring the lock
        run: |
          uv venv --python 3.10
          uv pip install --resolution lowest-direct -e ".[all]"

      - name: Unit tests on the floors
        run: uv run --no-sync pytest -m "not integration and not igv_integration"

  integration:
    needs: changes
    if: needs.changes.outputs.integration == 'true'
    name: Integration (${{ matrix.runtime }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            runtime: docker
          - os: ubuntu-24.04-arm
            arch: arm64
            runtime: docker
          - os: ubuntu-latest
            arch: x86_64
            runtime: apptainer
          - os: ubuntu-24.04-arm
            arch: arm64
            runtime: apptainer
    env:
      MCP_IGV_MOCK: "0"
      MCP_IGV_CONTAINER_IMAGE: "aganezov/igv_snapper:0.2"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up micromamba with bioinformatics CLIs
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          micromamba-version: "latest"
          environment-name: ci
          init-shell: bash
          condarc: |
            channels:
              - conda-forge
              - bioconda
            channel_priority: strict
          create-args: >-
            python=3.11 chopper cramino mosdepth=0.3.12 samtools bcftools nanoq=0.10.0
          cache-environment: true
          cache-downloads: true

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"

      - name: Check installed CLI versions
        shell: bash -l {0}
        run: |
          echo "=== System Architecture ==="
          uname -m
          echo ""
          echo "=== Tool Versions ==="
          chopper --version
          cramino --version
          mosdepth --version
          samtools --version
          bcftools --version
          nanoq --version
          echo ""
          echo "=== Verify mosdepth binary architecture ==="
          MOSDEPTH_PATH=$(which mosdepth)
          echo "mosdepth path: $MOSDEPTH_PATH"
          file "$MOSDEPTH_PATH" || echo "file command not available"
          echo ""
          echo "=== Quick mosdepth execution test ==="
          mosdepth --help | head -3 || echo "mosdepth help failed"

      - name: Pull IGV container image
        if: matrix.runtime == 'docker'
        run: docker pull ${{ env.MCP_IGV_CONTAINER_IMAGE }}

      - name: Install Apptainer (conda-forge)
        if: matrix.runtime == 'apptainer'
        shell: bash -l {0}
        run: |
          micromamba install -n ci apptainer
          APPTAINER_BIN="$(micromamba run -n ci which apptainer)"
          mkdir -p .ci-bin
          cat > .ci-bin/apptainer <<EOF
          #!/usr/bin/env bash
          exec sudo --preserve-env=APPTAINER_CACHEDIR,APPTAINER_TMPDIR,APPTAINER_DISABLE_CACHE "${APPTAINER_BIN}" "\$@"
          EOF
          chmod +x .ci-bin/apptainer
          echo "APPTAINER=$GITHUB_WORKSPACE/.ci-bin/apptainer" >> "$GITHUB_ENV"

      - name: Build IGV SIF
        if: matrix.runtime == 'apptainer'
        shell: bash -l {0}
        env:
          IGV_RUNTIME_DIR: ${{ runner.temp }}/igv_runtime
          APPTAINER_CACHEDIR: ${{ runner.temp }}/igv_runtime/cache
          APPTAINER_TMPDIR: ${{ runner.temp }}/igv_runtime/tmp
          APPTAINER_DISABLE_CACHE: "1"
        run: |
          mkdir -p "$IGV_RUNTIME_DIR/cache" "$IGV_RUNTIME_DIR/tmp"
          "${APPTAINER:-apptainer}" pull "$IGV_RUNTIME_DIR/igv_snapper.sif" docker://${{ env.MCP_IGV_CONTAINER_IMAGE }}

      - name: Create snapshot output directory
        run: mkdir -p igv_snapshots

      - name: Integration tests (full suite, docker)
        if: matrix.runtime == 'docker'
        shell: bash -l {0}
        env:
          IGV_SNAPSHOT_DIR: ${{ github.workspace }}/igv_snapshots
        run: pytest -m "integration or igv_integration or not integration" -ra

      - name: Integration tests (full suite, apptainer)
        if: matrix.runtime == 'apptainer'
        shell: bash -l {0}
        env:
          IGV_SNAPSHOT_DIR: ${{ github.workspace }}/igv_snapshots
          DOCKER: __no_docker__
          MCP_IGV_SIF_PATH: ${{ runner.temp }}/igv_runtime/igv_snapper.sif
          APPTAINER_CACHEDIR: ${{ runner.temp }}/igv_runtime/cache
          APPTAINER_TMPDIR: ${{ runner.temp }}/igv_runtime/tmp
          APPTAINER_DISABLE_CACHE: "1"
        run: pytest -m "integration or igv_integration or not integration" -ra

      - name: Upload IGV snapshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: igv-snapshots-${{ matrix.runtime }}-${{ matrix.arch }}
          path: igv_snapshots/
          if-no-files-found: ignore
          retention-days: 7

  # ---- Required gates -------------------------------------------------------
  # Branch protection requires these two stable names, NOT the matrix legs above.
  # Each gate always runs and certifies its tier: a tier SKIPPED by change-detection
  # counts as a pass (nothing to test), while a real failure/cancellation â€” or a
  # broken change-detection job â€” fails the gate. This lets a docs-only PR merge
  # without deadlocking on a "required" check that never reported.
  lint-gate:
    needs: [changes, lint-and-test, min-deps]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Certify lint tier (lint-and-test + min-deps)
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LINT_RESULT: ${{ needs.lint-and-test.result }}
          MINDEPS_RESULT: ${{ needs.min-deps.result }}
        run: |
          echo "change-detection=$CHANGES_RESULT  lint-and-test=$LINT_RESULT  min-deps=$MINDEPS_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::change-detection did not succeed ($CHANGES_RESULT); cannot certify."
            exit 1
          fi
          for r in "$LINT_RESULT" "$MINDEPS_RESULT"; do
            case "$r" in
              success | skipped) ;;
              *) echo "::error::a lint-tier job result is '$r'." ; exit 1 ;;
            esac
          done
          echo "lint-gate OK (lint-and-test=$LINT_RESULT, min-deps=$MINDEPS_RESULT)"

  integration-gate:
    needs: [changes, integration]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Certify integration
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          JOB_RESULT: ${{ needs.integration.result }}
        run: |
          echo "change-detection=$CHANGES_RESULT  integration=$JOB_RESULT"
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::change-detection did not succeed ($CHANGES_RESULT); cannot certify."
            exit 1
          fi
          case "$JOB_RESULT" in
            success | skipped) echo "integration-gate OK ($JOB_RESULT)" ;;
            *) echo "::error::integration result is '$JOB_RESULT'." ; exit 1 ;;
          esac
